<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Juntar PDFs — Ferramentas Jackson</title>
<style>
  :root{--bg:#101418;--panel:#1a2129;--panel2:#212a34;--line:#2e3a47;--txt:#e8edf2;--mut:#8b9aa8;--acc:#35c4a2;--danger:#e5484d}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Segoe UI",system-ui,sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;display:flex;flex-direction:column}
  .assinatura{position:fixed;top:6px;right:12px;font-size:8px;color:var(--mut);letter-spacing:.12em;z-index:9999;opacity:.7;pointer-events:none}
  .navbar{background:#0b0e12;border-bottom:2px solid var(--line);padding:12px 18px;position:sticky;top:0;z-index:100}
  .navbar a{color:var(--mut);text-decoration:none;font-weight:600;font-size:.92rem;display:inline-flex;align-items:center;gap:8px}
  .navbar a:hover{color:var(--acc)}
  .wrap{flex:1;display:flex;flex-direction:column;align-items:center;padding:40px 20px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:16px;box-shadow:0 12px 30px rgba(0,0,0,.25);padding:32px;width:100%;max-width:600px;text-align:center}
  .card h1{font-size:1.5rem;margin-bottom:8px}
  .card .desc{color:var(--mut);font-size:.92rem;margin-bottom:22px}
  .btn{background:var(--acc);color:#08110d;border:none;border-radius:10px;padding:12px 22px;font-weight:700;font-size:1rem;cursor:pointer;transition:filter .15s,transform .1s;margin-top:14px;display:inline-block}
  .btn:hover:not(:disabled){filter:brightness(1.08)} .btn:active{transform:translateY(1px)}
  .btn:disabled{background:#3a4652;color:#8b9aa8;cursor:not-allowed}
  .btn-file{background:var(--panel2);color:var(--txt);border:1px solid var(--line)}
  input[type=file]{display:none}
  .file-list{margin-top:20px;text-align:left;background:var(--panel2);padding:14px;border-radius:10px;border:1px solid var(--line);min-height:52px;font-size:.9rem;color:var(--mut)}
  .file-item{padding:8px 4px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;color:var(--txt)}
  .file-item:last-child{border-bottom:none}
  footer{text-align:center;color:var(--mut);font-size:.78rem;padding:22px;border-top:1px solid var(--line)}
  footer b{color:var(--txt)}
</style>
</head>
<body>
<div class="assinatura">DESENVOLVIDO JACKSON GOMES</div>
<nav class="navbar"><a href="index.html">🏠 Voltar ao Início</a></nav>

<div class="wrap">
  <div class="card">
    <h1>📎 Juntar PDFs</h1>
    <p class="desc">Selecione vários arquivos PDF para mesclá-los em um só documento.</p>

    <label class="btn btn-file">+ Selecionar PDFs
      <input type="file" id="file-input" accept="application/pdf" multiple>
    </label>

    <div class="file-list" id="file-list">Nenhum arquivo selecionado.</div>

    <button id="merge-btn" class="btn" disabled>Mesclar e Baixar</button>
  </div>
</div>

<footer>
  <a href="https://wa.me/5511985926457?text=Ol%C3%A1%20Jackson!%20Reportando%20um%20bug%2Fsugest%C3%A3o%3A%20" target="_blank" rel="noopener" style="display:inline-flex;align-items:center;gap:7px;background:#25d366;color:#06210f;text-decoration:none;font-weight:700;font-size:.8rem;padding:9px 16px;border-radius:999px;margin-bottom:10px">💬 Reportar bug ou sugerir função</a>
  <div>Desenvolvido por <b>Jackson Gomes</b></div>
</footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
<script>
    let selectedFiles = [];
    const fileInput = document.getElementById('file-input');
    const fileList = document.getElementById('file-list');
    const mergeBtn = document.getElementById('merge-btn');

    fileInput.addEventListener('change', (e) => {
        selectedFiles = Array.from(e.target.files);
        if (selectedFiles.length > 0) {
            fileList.innerHTML = selectedFiles.map((f, i) => `<div class="file-item"><span>${i+1}. ${f.name}</span></div>`).join('');
            mergeBtn.disabled = false;
        }
    });

    mergeBtn.addEventListener('click', async () => {
        mergeBtn.disabled = true;
        mergeBtn.textContent = 'Processando...';
        try {
            const { PDFDocument } = PDFLib;
            const mergedPdf = await PDFDocument.create();
            for (const file of selectedFiles) {
                const arrayBuffer = await file.arrayBuffer();
                const pdf = await PDFDocument.load(arrayBuffer);
                const copiedPages = await mergedPdf.copyPages(pdf, pdf.getPageIndices());
                copiedPages.forEach((page) => mergedPdf.addPage(page));
            }
            const pdfBytes = await mergedPdf.save();
            const blob = new Blob([pdfBytes], { type: "application/pdf" });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = "PDF_Mesclado.pdf";
            link.click();
        } catch (error) {
            alert("Erro ao mesclar arquivos.");
            console.error(error);
        } finally {
            mergeBtn.disabled = false;
            mergeBtn.textContent = 'Mesclar e Baixar';
        }
    });
</script>
</body>
</html>
