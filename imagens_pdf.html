<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Imagens para PDF — Ferramentas Administrativas</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  :root{--bg:#0e1216;--panel:#171d24;--panel2:#1e2630;--line:#293440;--txt:#e6ebf0;--mut:#8593a1;--acc:#35c4a2}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Segoe UI",system-ui,sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;display:flex;flex-direction:column}
  .assinatura{position:fixed;top:5px;right:11px;font-size:7px;color:var(--mut);letter-spacing:.14em;z-index:9999;opacity:.65;pointer-events:none}
  .navbar{background:#0a0d11;border-bottom:1px solid var(--line);padding:11px 20px;position:sticky;top:0;z-index:100}
  .navbar a{color:var(--mut);text-decoration:none;font-weight:600;font-size:.88rem;display:inline-flex;align-items:center;gap:8px}
  .navbar a:hover{color:var(--acc)}
  .wrap{flex:1;display:flex;flex-direction:column;align-items:center;padding:36px 20px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;box-shadow:0 12px 30px rgba(0,0,0,.28);padding:28px;width:100%;max-width:560px}
  .card h1{font-size:1.4rem;text-align:center;margin-bottom:6px}
  .card .desc{color:var(--mut);font-size:.88rem;text-align:center;margin-bottom:22px}
  .form-group{margin-bottom:1.3rem;display:flex;flex-direction:column}
  label{font-weight:600;font-size:.85rem;color:var(--mut);margin-bottom:.5rem}
  select,input[type=number]{padding:.7rem;border:1px solid var(--line);border-radius:8px;font-size:.95rem;background:var(--panel2);color:var(--txt)}
  input[type=file]{padding:.7rem;border:1px solid var(--line);border-radius:8px;background:var(--panel2);color:var(--txt);font-size:.9rem}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
  .btn{width:100%;background:var(--acc);color:#08110d;border:none;padding:.9rem;font-size:1rem;border-radius:10px;cursor:pointer;font-weight:700;transition:filter .15s,transform .1s;margin-top:.4rem}
  .btn:hover:not(:disabled){filter:brightness(1.08)} .btn:active{transform:translateY(1px)}
  .btn:disabled{background:#3a4652;color:#8593a1;cursor:not-allowed}
  .preview-list{margin-top:.6rem;font-size:.82rem;color:var(--acc);font-weight:600}
  footer{text-align:center;color:var(--mut);font-size:.76rem;padding:20px;border-top:1px solid var(--line)}
  footer b{color:var(--txt)}
  @media(max-width:480px){.grid2{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="assinatura">DESENVOLVIDO JACKSON GOMES</div>
<nav class="navbar"><a href="index.html">🏠 Voltar ao Início</a></nav>

<div class="wrap">
  <div class="card">
    <h1>🖼️ Imagens para PDF</h1>
    <p class="desc">Junte várias imagens em um único PDF, com orientação, formato e margem personalizados.</p>

    <div class="form-group">
      <label for="fileInput">Selecione as imagens:</label>
      <input type="file" id="fileInput" accept="image/*" multiple>
      <div id="fileList" class="preview-list">Nenhum arquivo selecionado.</div>
    </div>

    <div class="grid2">
      <div class="form-group">
        <label for="orientation">Orientação:</label>
        <select id="orientation">
          <option value="p">Retrato (Vertical)</option>
          <option value="l">Paisagem (Horizontal)</option>
        </select>
      </div>
      <div class="form-group">
        <label for="format">Formato:</label>
        <select id="format">
          <option value="a4">A4</option>
          <option value="letter">Carta (Letter)</option>
          <option value="legal">Ofício (Legal)</option>
        </select>
      </div>
    </div>

    <div class="form-group">
      <label for="margin">Margem (mm):</label>
      <input type="number" id="margin" value="10" min="0" max="50">
    </div>

    <button id="convertBtn" class="btn">Converter e Baixar PDF</button>
  </div>
</div>

<footer>Desenvolvido por <b>Jackson Gomes</b></footer>

<script>
    const fileInput = document.getElementById('fileInput');
    const fileList = document.getElementById('fileList');
    const convertBtn = document.getElementById('convertBtn');
    let selectedFiles = [];

    fileInput.addEventListener('change', (e) => {
        selectedFiles = Array.from(e.target.files);
        fileList.innerHTML = selectedFiles.length > 0
            ? `${selectedFiles.length} arquivo(s) selecionado(s).`
            : 'Nenhum arquivo selecionado.';
    });

    const readImage = (file) => new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = (e) => {
            const img = new Image();
            img.onload = () => resolve({ img, data: e.target.result });
            img.onerror = reject;
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    });

    convertBtn.addEventListener('click', async () => {
        if (selectedFiles.length === 0) { alert('Por favor, selecione pelo menos uma imagem.'); return; }
        convertBtn.textContent = "Gerando PDF...";
        convertBtn.disabled = true;
        try {
            const { jsPDF } = window.jspdf;
            const orientation = document.getElementById('orientation').value;
            const format = document.getElementById('format').value;
            const margin = parseInt(document.getElementById('margin').value) || 0;
            const pdf = new jsPDF({ orientation, unit: 'mm', format });
            const pageWidth = pdf.internal.pageSize.getWidth();
            const pageHeight = pdf.internal.pageSize.getHeight();
            for (let i = 0; i < selectedFiles.length; i++) {
                const file = selectedFiles[i];
                if (i > 0) pdf.addPage(format, orientation);
                const { img, data } = await readImage(file);
                const maxWidth = pageWidth - (margin * 2);
                const maxHeight = pageHeight - (margin * 2);
                const ratio = Math.min(maxWidth / img.width, maxHeight / img.height);
                const finalWidth = img.width * ratio;
                const finalHeight = img.height * ratio;
                const x = (pageWidth - finalWidth) / 2;
                const y = (pageHeight - finalHeight) / 2;
                const extension = file.name.split('.').pop().toUpperCase();
                const imageType = (extension === 'PNG') ? 'PNG' : 'JPEG';
                pdf.addImage(data, imageType, x, y, finalWidth, finalHeight);
            }
            pdf.save('documento_convertido.pdf');
        } catch (error) {
            console.error(error);
            alert('Ocorreu um erro ao converter os arquivos.');
        } finally {
            convertBtn.textContent = "Converter e Baixar PDF";
            convertBtn.disabled = false;
        }
    });
</script>
</body>
</html>
