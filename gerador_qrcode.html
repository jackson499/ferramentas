<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gerador de QR Code — Ferramentas Administrativas</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
:root{--bg:#0e1216;--panel:#171d24;--panel2:#1e2630;--line:#293440;--txt:#e6ebf0;--mut:#8593a1;--acc:#35c4a2;--wa:#25d366}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Segoe UI",system-ui,-apple-system,Roboto,sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;display:flex;flex-direction:column}
.navbar{background:var(--panel);border-bottom:1px solid var(--line);padding:12px 20px}
.navbar a{color:var(--acc);text-decoration:none;font-weight:600;font-size:.9rem}
.wrap{flex:1;max-width:640px;width:100%;margin:0 auto;padding:32px 20px}
h1{font-size:1.5rem;margin-bottom:6px}
.sub{color:var(--mut);font-size:.9rem;margin-bottom:24px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:24px}
label{display:block;font-weight:600;font-size:.85rem;margin:14px 0 6px}
input,select{width:100%;background:var(--panel2);border:1px solid var(--line);border-radius:10px;color:var(--txt);padding:12px;font-size:1rem;font-family:inherit}
.row{display:flex;gap:12px}.row>div{flex:1}
.btn{width:100%;margin-top:18px;background:var(--acc);color:#04211a;border:none;border-radius:12px;padding:14px;font-size:1rem;font-weight:700;cursor:pointer}
.btn:hover{filter:brightness(1.06)}
#qrbox{display:none;margin-top:22px;text-align:center}
#qr{display:inline-block;background:#fff;padding:16px;border-radius:12px}
.dl{margin-top:14px;background:transparent;border:1px solid var(--acc);color:var(--acc);border-radius:10px;padding:10px 18px;font-weight:700;cursor:pointer}
.foot{text-align:center;padding:22px 20px 30px}
.fbtn{display:inline-flex;align-items:center;gap:7px;background:var(--wa);color:#06210f;text-decoration:none;font-weight:700;font-size:.8rem;padding:9px 16px;border-radius:999px;margin-bottom:10px}
.foot div{color:var(--mut);font-size:.75rem}.foot b{color:var(--acc)}
</style>
</head>
<body>
<nav class="navbar"><a href="index.html">🏠 Voltar ao Início</a></nav>
<div class="wrap">
  <h1>🔳 Gerador de QR Code</h1>
  <p class="sub">Gere QR Codes de links, textos, PIX copia-e-cola, telefones — e baixe em PNG.</p>
  <div class="card">
    <label>Conteúdo (link, texto, etc.)</label>
    <input type="text" id="txt" placeholder="https://... ou qualquer texto" oninput="gerar()">
    <div class="row">
      <div><label>Tamanho</label>
        <select id="size" onchange="gerar()"><option value="180">Pequeno</option><option value="260" selected>Médio</option><option value="360">Grande</option></select>
      </div>
      <div><label>Correção de erro</label>
        <select id="ecl" onchange="gerar()"><option value="L">Baixa</option><option value="M" selected>Média</option><option value="Q">Alta</option><option value="H">Máxima</option></select>
      </div>
    </div>
    <button class="btn" onclick="gerar()">Gerar QR Code</button>
    <div id="qrbox"><div id="qr"></div><br><button class="dl" onclick="baixar()">⬇ Baixar PNG</button></div>
  </div>
</div>
<div class="foot">
<a class="fbtn" href="https://wa.me/5511985926457?text=Ol%C3%A1%20Jackson!%20Reportando%20um%20bug%2Fsugest%C3%A3o%20no%20Gerador%20de%20QR%20Code%3A%20" target="_blank" rel="noopener">💬 Reportar bug ou sugerir função</a>
<div>Desenvolvido por <b>Jackson Gomes</b></div>
</div>
<script>
let qrObj=null;
function gerar(){
  const txt=document.getElementById('txt').value.trim();
  const box=document.getElementById('qrbox'), el=document.getElementById('qr');
  if(!txt){ box.style.display='none'; return; }
  el.innerHTML='';
  const size=+document.getElementById('size').value;
  const lvl=QRCode.CorrectLevel[document.getElementById('ecl').value];
  qrObj=new QRCode(el,{text:txt,width:size,height:size,correctLevel:lvl,colorDark:'#000000',colorLight:'#ffffff'});
  box.style.display='block';
}
function baixar(){
  const c=document.querySelector('#qr canvas'); if(!c) return;
  const a=document.createElement('a'); a.href=c.toDataURL('image/png'); a.download='qrcode.png'; a.click();
}
</script>
</body>
</html>
