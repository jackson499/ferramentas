<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Remover Duplicados — Ferramentas Administrativas</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{--bg:#0e1216;--panel:#171d24;--panel2:#1e2630;--line:#293440;--txt:#e6ebf0;--mut:#8593a1;--acc:#35c4a2;--wa:#25d366}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Segoe UI",system-ui,-apple-system,Roboto,sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;display:flex;flex-direction:column}
.navbar{background:var(--panel);border-bottom:1px solid var(--line);padding:12px 20px}
.navbar a{color:var(--acc);text-decoration:none;font-weight:600;font-size:.9rem}
.wrap{flex:1;max-width:680px;width:100%;margin:0 auto;padding:32px 20px}
h1{font-size:1.5rem;margin-bottom:6px}
.sub{color:var(--mut);font-size:.9rem;margin-bottom:24px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:24px}
label{display:block;font-weight:600;font-size:.85rem;margin:14px 0 6px}
input[type=file],textarea{width:100%;background:var(--panel2);border:1px solid var(--line);border-radius:10px;color:var(--txt);padding:12px;font-size:1rem;font-family:inherit}
textarea{min-height:130px;resize:vertical;font-family:Consolas,monospace}
.opts{display:flex;gap:18px;margin-top:12px;flex-wrap:wrap}
.opts label{display:flex;align-items:center;gap:7px;margin:0;font-weight:500;font-size:.85rem;cursor:pointer}
.opts input{width:auto}
.btn{width:100%;margin-top:18px;background:var(--acc);color:#04211a;border:none;border-radius:12px;padding:14px;font-size:1rem;font-weight:700;cursor:pointer}
.btn:hover{filter:brightness(1.06)}
.btn.ghost{background:transparent;border:1px solid var(--acc);color:var(--acc);display:none}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:20px}
.stat{border-radius:12px;padding:16px;text-align:center;color:#fff}
.stat .n{font-size:1.7rem;font-weight:800}.stat .l{font-size:.7rem;text-transform:uppercase;letter-spacing:.06em;opacity:.9;margin-top:4px}
.s1{background:linear-gradient(135deg,#4a5568,#2d3748)}.s2{background:linear-gradient(135deg,var(--acc),#1f8f74)}.s3{background:linear-gradient(135deg,#c58a20,#9c6d15)}
.res{margin-top:16px;background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:12px;font-family:Consolas,monospace;font-size:.85rem;max-height:260px;overflow:auto;white-space:pre-wrap;display:none}
.foot{text-align:center;padding:22px 20px 30px}
.fbtn{display:inline-flex;align-items:center;gap:7px;background:var(--wa);color:#06210f;text-decoration:none;font-weight:700;font-size:.8rem;padding:9px 16px;border-radius:999px;margin-bottom:10px}
.foot div{color:var(--mut);font-size:.75rem}.foot b{color:var(--acc)}
.hint{color:var(--mut);font-size:.8rem;margin-top:6px}
</style>
</head>
<body>
<nav class="navbar"><a href="index.html">🏠 Voltar ao Início</a></nav>
<div class="wrap">
  <h1>🗂️ Remover Duplicados</h1>
  <p class="sub">Elimina itens repetidos de uma lista ou da primeira coluna de uma planilha.</p>
  <div class="card">
    <label>Importar Excel, CSV ou TXT</label>
    <input type="file" id="file" accept=".xlsx,.xls,.csv,.txt">
    <p class="hint">Ou cole os itens abaixo (um por linha). <a href="#" onclick="baixarModelo();return false;" style="color:var(--acc);font-weight:600">⬇ Baixar modelo de importação</a></p>
    <label style="margin-top:14px">Lista</label>
    <textarea id="txt" placeholder="joão@email.com&#10;maria@email.com&#10;joão@email.com"></textarea>
    <div class="opts">
      <label><input type="checkbox" id="case" checked> Ignorar maiúsc./minúsc.</label>
      <label><input type="checkbox" id="trim" checked> Ignorar espaços nas pontas</label>
      <label><input type="checkbox" id="empty" checked> Remover linhas vazias</label>
    </div>
    <button class="btn" onclick="processar()">Remover duplicados</button>
    <div class="stats">
      <div class="stat s1"><div class="n" id="c-total">0</div><div class="l">Entrada</div></div>
      <div class="stat s2"><div class="n" id="c-uni">0</div><div class="l">Únicos</div></div>
      <div class="stat s3"><div class="n" id="c-dup">0</div><div class="l">Removidos</div></div>
    </div>
    <button class="btn ghost" id="baixar" onclick="baixar()">⬇ Baixar lista limpa (CSV)</button>
    <div class="res" id="res"></div>
  </div>
</div>
<div class="foot">
<a class="fbtn" href="https://wa.me/5511985926457?text=Ol%C3%A1%20Jackson!%20Reportando%20um%20bug%2Fsugest%C3%A3o%20no%20Remover%20Duplicados%3A%20" target="_blank" rel="noopener">💬 Reportar bug ou sugerir função</a>
<div>Desenvolvido por <b>Jackson Gomes</b></div>
</div>
<script>
let unicos=[];
function baixarModelo(){
  const dados=[['item'],['joao@email.com'],['maria@email.com'],['joao@email.com'],['pedro@email.com']];
  const ws=XLSX.utils.aoa_to_sheet(dados); ws['!cols']=[{wch:26}];
  const wb=XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb,ws,'itens');
  XLSX.writeFile(wb,'modelo_remover_duplicados.xlsx');
}
function linhasDeTexto(t){ return t.split(/\r?\n/); }
async function coletar(){
  const file=document.getElementById('file').files[0];
  if(file){
    const ext=(file.name.split('.').pop()||'').toLowerCase();
    if(ext==='xlsx'||ext==='xls'){
      const wb=XLSX.read(await file.arrayBuffer(),{type:'array'}); let arr=[];
      wb.SheetNames.forEach(sn=>XLSX.utils.sheet_to_json(wb.Sheets[sn],{header:1}).forEach(r=>{ if(r[0]!=null) arr.push(String(r[0])); }));
      return arr;
    }
    return linhasDeTexto(await file.text());
  }
  return linhasDeTexto(document.getElementById('txt').value);
}
async function processar(){
  let linhas;
  try{ linhas=await coletar(); }catch(e){ alert('Erro ao ler: '+e.message); return; }
  const ic=document.getElementById('case').checked, it=document.getElementById('trim').checked, re=document.getElementById('empty').checked;
  const seen=new Set(); unicos=[];
  linhas.forEach(l=>{
    let v=it?l.trim():l;
    if(re && v.trim()==='') return;
    let key=ic?v.toLowerCase():v;
    if(!seen.has(key)){ seen.add(key); unicos.push(v); }
  });
  const totalConsiderado=linhas.filter(l=>{ let v=it?l.trim():l; return !(re && v.trim()===''); }).length;
  document.getElementById('c-total').innerText=totalConsiderado;
  document.getElementById('c-uni').innerText=unicos.length;
  document.getElementById('c-dup').innerText=totalConsiderado-unicos.length;
  const res=document.getElementById('res'); res.style.display='block';
  res.textContent=unicos.slice(0,1000).join('\n');
  document.getElementById('baixar').style.display='block';
}
function baixar(){
  const blob=new Blob(['﻿'+unicos.join('\n')],{type:'text/csv;charset=utf-8;'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='lista_sem_duplicados.csv'; a.click(); URL.revokeObjectURL(a.href);
}
</script>
</body>
</html>
