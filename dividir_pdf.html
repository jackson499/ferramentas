<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dividir PDF — Ferramentas Jackson</title>
<style>
  :root{--bg:#101418;--panel:#1a2129;--panel2:#212a34;--line:#2e3a47;--txt:#e8edf2;--mut:#8b9aa8;--acc:#35c4a2;--danger:#e5484d}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Segoe UI",system-ui,sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;display:flex;flex-direction:column}
  .assinatura{position:fixed;top:6px;right:12px;font-size:8px;color:var(--mut);letter-spacing:.12em;z-index:9999;opacity:.7;pointer-events:none}
  .navbar{background:#0b0e12;border-bottom:2px solid var(--line);padding:12px 18px;position:sticky;top:0;z-index:100}
  .navbar a{color:var(--mut);text-decoration:none;font-weight:600;font-size:.92rem;display:inline-flex;align-items:center;gap:8px}
  .navbar a:hover{color:var(--acc)}
  .wrap{flex:1;display:flex;flex-direction:column;align-items:center;padding:40px 20px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:16px;box-shadow:0 12px 30px rgba(0,0,0,.25);padding:32px;width:100%;max-width:520px;text-align:center}
  .card h1{font-size:1.5rem;margin-bottom:8px}
  .card .desc{color:var(--mut);font-size:.92rem;margin-bottom:22px}
  .btn{background:var(--acc);color:#08110d;border:none;border-radius:10px;padding:12px 22px;font-weight:700;font-size:1rem;cursor:pointer;transition:filter .15s,transform .1s;margin-top:14px;width:100%}
  .btn:hover:not(:disabled){filter:brightness(1.08)} .btn:active{transform:translateY(1px)}
  .btn:disabled{background:#3a4652;color:#8b9aa8;cursor:not-allowed}
  .btn-file{background:var(--panel2);color:var(--txt);border:1px solid var(--line);width:auto;display:inline-block}
  input[type=file]{display:none}
  input[type=text]{width:100%;padding:12px;border:1px solid var(--line);border-radius:10px;background:var(--panel2);color:var(--txt);font-size:1rem;margin-top:8px}
  input[type=text]::placeholder{color:#6b7a8d}
  .input-group{margin-top:20px;text-align:left}
  .input-group label{font-weight:600;font-size:.88rem;color:var(--mut)}
  .file-name{margin-top:14px;font-weight:600;color:var(--acc)}
  footer{text-align:center;color:var(--mut);font-size:.78rem;padding:22px;border-top:1px solid var(--line)}
  footer b{color:var(--txt)}
</style>
</head>
<body>
<div class="assinatura">DESENVOLVIDO JACKSON GOMES</div>
<nav class="navbar"><a href="index.html">🏠 Voltar ao Início</a></nav>

<div class="wrap">
  <div class="card">
    <h1>✂️ Dividir PDF</h1>
    <p class="desc">Selecione um arquivo e defina quais páginas deseja manter.</p>

    <label class="btn btn-file">Carregar PDF
      <input type="file" id="file-input" accept="application/pdf">
    </label>

    <div class="file-name" id="file-name"></div>

    <div class="input-group">
      <label>Páginas para extrair (ex.: 1-3 ou 1, 4, 5):</label>
      <input type="text" id="pages-input" placeholder="Ex: 1-5" disabled>
    </div>

    <button id="split-btn" class="btn" disabled>Extrair e Baixar Novo PDF</button>
  </div>
</div>

<footer>Desenvolvido por <b>Jackson Gomes</b></footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
<script>
    let pdfFile = null;
    let totalPages = 0;
    const fileInput = document.getElementById('file-input');
    const fileName = document.getElementById('file-name');
    const pagesInput = document.getElementById('pages-input');
    const splitBtn = document.getElementById('split-btn');

    fileInput.addEventListener('change', async (e) => {
        pdfFile = e.target.files[0];
        if (pdfFile) {
            fileName.textContent = pdfFile.name;
            pagesInput.disabled = false;
            splitBtn.disabled = false;
            const arrayBuffer = await pdfFile.arrayBuffer();
            const pdf = await PDFLib.PDFDocument.load(arrayBuffer);
            totalPages = pdf.getPageCount();
            pagesInput.placeholder = `Ex: 1-${totalPages}`;
        }
    });

    function parsePageRanges(input) {
        const pages = new Set();
        const parts = input.split(',').map(p => p.trim());
        for (const part of parts) {
            if (part.includes('-')) {
                const [start, end] = part.split('-').map(Number);
                if (start > 0 && end >= start) {
                    for (let i = start; i <= end; i++) pages.add(i - 1);
                }
            } else {
                const num = Number(part);
                if (num > 0) pages.add(num - 1);
            }
        }
        return Array.from(pages).filter(p => p < totalPages).sort((a,b) => a-b);
    }

    splitBtn.addEventListener('click', async () => {
        const val = pagesInput.value;
        if(!val) return alert("Digite as páginas que deseja extrair.");
        const indicesToKeep = parsePageRanges(val);
        if(indicesToKeep.length === 0) return alert("Intervalo inválido.");
        splitBtn.disabled = true;
        splitBtn.textContent = 'Processando...';
        try {
            const { PDFDocument } = PDFLib;
            const originalPdf = await PDFDocument.load(await pdfFile.arrayBuffer());
            const newPdf = await PDFDocument.create();
            const copiedPages = await newPdf.copyPages(originalPdf, indicesToKeep);
            copiedPages.forEach((page) => newPdf.addPage(page));
            const pdfBytes = await newPdf.save();
            const blob = new Blob([pdfBytes], { type: "application/pdf" });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = "PDF_Extraido.pdf";
            link.click();
        } catch (error) {
            alert("Erro ao extrair páginas.");
        } finally {
            splitBtn.disabled = false;
            splitBtn.textContent = 'Extrair e Baixar Novo PDF';
        }
    });
</script>
</body>
</html>
